services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      DB_PATH: /var/www/storage/database.sqlite
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SOKETI_DEFAULT_APP_ID: 3932a5aa-ee88-4bc5-a966-4952d9c22b86
      SOKETI_DEFAULT_APP_KEY: e79c5aff8362a28faddc6751086dbceb
      SOKETI_DEFAULT_APP_SECRET: dc98aabf44bf6711d4900a7a0df06cddd748b089eb9a4778cc165409b5615f0f
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worker
    command: php app/Workers/run-cleaner.php
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      DB_PATH: /var/www/storage/database.sqlite
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SOKETI_APP_KEY: e79c5aff8362a28faddc6751086dbceb
        VITE_API_URL: http://localhost:8000
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: docker.io/redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: soketi
    environment:
      SOKETI_DEBUG: 1
      SOKETI_DEFAULT_APP_ID: 3932a5aa-ee88-4bc5-a966-4952d9c22b86
      SOKETI_DEFAULT_APP_KEY: e79c5aff8362a28faddc6751086dbceb
      SOKETI_DEFAULT_APP_SECRET: dc98aabf44bf6711d4900a7a0df06cddd748b089eb9a4778cc165409b5615f0f
    ports:
      - "6001:6001"
      - "9601:9601"