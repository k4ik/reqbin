services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      DB_PATH: /var/www/storage/database.sqlite
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker
    command: php app/Workers/run-cleaner.php
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      DB_PATH: /var/www/storage/database.sqlite
    restart: unless-stopped